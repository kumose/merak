syntax="proto2";
import "google/protobuf/any.proto";

message Dummy {}

message RepeatedMessage {
    repeated int32 ints = 1;
    repeated string strings = 2;
    repeated Dummy msgs = 3;
}

message M1 {
    optional int64 a =1;
}

message M2 {
    optional string b =1;
}

message Mox {
    optional google.protobuf.Any detail = 1;
    repeated google.protobuf.Any details = 6;
    optional M1 m_abc = 2;
    optional string n_abc = 3;
    optional int64 oAbc = 4;
    repeated int32 gAbc = 5;
}